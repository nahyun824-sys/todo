<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 32px 24px;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .nav-group { display: flex; gap: 8px; }

    .nav-btn {
      background: #fff;
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      color: #555;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      transition: background .15s;
    }
    .nav-btn:hover { background: #e2e5ea; }

    /* ── Calendar ── */
    .calendar-wrap {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #f0f2f5;
    }
    .weekdays span {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      padding: 12px 0;
    }
    .weekdays span:first-child { color: #f56565; }
    .weekdays span:last-child  { color: #667eea; }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(130px, auto);
      border-left: 1px solid #f0f2f5;
    }

    .day-cell {
      border-right: 1px solid #f0f2f5;
      border-bottom: 1px solid #f0f2f5;
      padding: 8px;
      cursor: pointer;
      transition: background .12s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 130px;
    }
    .day-cell:hover:not(.empty) { background: #fafbff; }
    .day-cell.empty { cursor: default; background: #fafafa; }

    .day-cell.selected { background: #f5f3ff; }
    .day-cell.selected:hover { background: #ede9fe; }

    /* Date number */
    .day-num {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .day-cell.sunday  .day-num { color: #f56565; }
    .day-cell.saturday .day-num { color: #667eea; }
    .day-cell.today .day-num {
      background: #667eea;
      color: #fff !important;
    }
    .day-cell.selected:not(.today) .day-num {
      background: #667eea22;
      color: #667eea;
    }

    /* Inline todo items */
    .cell-todos {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      overflow: hidden;
    }

    .cell-todo {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      line-height: 1.3;
      padding: 3px 5px;
      border-radius: 5px;
      background: #f0f2f5;
      overflow: hidden;
    }
    .cell-todo.done-item { background: #f0fff4; }

    .cell-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #fc8181;
    }
    .cell-todo.done-item .cell-dot { background: #68d391; }

    .cell-todo-text {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #555;
      flex: 1;
    }
    .cell-todo.done-item .cell-todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .cell-more {
      font-size: 10px;
      color: #aaa;
      padding: 1px 5px;
    }

    /* ── Modal overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: popIn .18s ease;
    }
    @keyframes popIn {
      from { transform: scale(.95); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-date { font-size: 13px; color: #aaa; margin-bottom: 3px; }
    .modal-title { font-size: 20px; font-weight: 700; color: #1a1a2e; }

    .close-btn {
      background: #f0f2f5;
      border: none;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      font-size: 16px;
      cursor: pointer;
      color: #888;
      flex-shrink: 0;
    }
    .close-btn:hover { background: #e2e5ea; }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .add-input {
      flex: 1;
      border: 1.5px solid #e2e5ea;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      color: #333;
    }
    .add-input:focus { border-color: #667eea; }

    .add-btn {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 300;
      transition: background .15s;
    }
    .add-btn:hover { background: #5a67d8; }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      background: #fafafa;
      border-radius: 12px;
      transition: background .12s;
    }
    .todo-item:hover { background: #f0f2f5; }

    .todo-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ddd;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .todo-check.checked { background: #68d391; border-color: #68d391; }
    .todo-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #333;
      word-break: break-all;
      cursor: pointer;
    }
    .todo-text.done { text-decoration: line-through; color: #aaa; }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color .15s;
    }
    .del-btn:hover { color: #f56565; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 24px 0;
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="cal-title" id="calTitle"></div>
  <div class="nav-group">
    <button class="nav-btn" id="prevBtn">‹</button>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <span>일</span><span>월</span><span>화</span><span>수</span>
    <span>목</span><span>금</span><span>토</span>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="close-btn" id="closeBtn">×</button>
    </div>
    <div class="add-row">
      <input class="add-input" id="addInput" placeholder="새 할일 입력..." autocomplete="off" />
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'todo_calendar_data';
  let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  let viewYear, viewMonth, activeKey = null;

  const today = new Date();
  viewYear  = today.getFullYear();
  viewMonth = today.getMonth();

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function renderCalendar() {
    const months = ['1월','2월','3월','4월','5월','6월',
                    '7월','8월','9월','10월','11월','12월'];
    document.getElementById('calTitle').textContent = `${viewYear}년 ${months[viewMonth]}`;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= lastDate; d++) {
      const key = dateKey(viewYear, viewMonth, d);
      const dow  = (firstDay + d - 1) % 7;
      const isToday = d === today.getDate() &&
                      viewMonth === today.getMonth() &&
                      viewYear  === today.getFullYear();

      let cls = 'day-cell';
      if (dow === 0) cls += ' sunday';
      if (dow === 6) cls += ' saturday';
      if (isToday)   cls += ' today';
      if (key === activeKey) cls += ' selected';

      const cell = document.createElement('div');
      cell.className = cls;

      // Date number
      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      // Inline todos
      const items = todos[key] || [];
      if (items.length > 0) {
        const todosEl = document.createElement('div');
        todosEl.className = 'cell-todos';

        const showCount = 3;
        items.slice(0, showCount).forEach(item => {
          const row = document.createElement('div');
          row.className = 'cell-todo' + (item.done ? ' done-item' : '');

          const dot = document.createElement('div');
          dot.className = 'cell-dot';

          const txt = document.createElement('div');
          txt.className = 'cell-todo-text';
          txt.textContent = item.text;

          row.appendChild(dot);
          row.appendChild(txt);
          todosEl.appendChild(row);
        });

        if (items.length > showCount) {
          const more = document.createElement('div');
          more.className = 'cell-more';
          more.textContent = `+${items.length - showCount}개 더`;
          todosEl.appendChild(more);
        }

        cell.appendChild(todosEl);
      }

      cell.addEventListener('click', () => openModal(viewYear, viewMonth, d));
      grid.appendChild(cell);
    }
  }

  /* ── Modal ── */
  function openModal(y, m, d) {
    const weekdays = ['일','월','화','수','목','금','토'];
    const dow = new Date(y, m, d).getDay();
    activeKey = dateKey(y, m, d);

    document.getElementById('modalDate').textContent =
      `${y}년 ${m+1}월 ${d}일 (${weekdays[dow]})`;
    document.getElementById('modalTitle').textContent = '할 일';

    document.getElementById('overlay').classList.add('open');
    renderList();
    renderCalendar();

    const input = document.getElementById('addInput');
    input.value = '';
    input.focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    activeKey = null;
    renderCalendar();
  }

  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  function renderList() {
    const list = document.getElementById('todoList');
    const items = todos[activeKey] || [];

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-msg">아직 할일이 없어요</div>';
      return;
    }

    list.innerHTML = '';
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'todo-item';

      const check = document.createElement('div');
      check.className = 'todo-check' + (item.done ? ' checked' : '');
      check.addEventListener('click', () => { toggleTodo(idx); });

      const text = document.createElement('div');
      text.className = 'todo-text' + (item.done ? ' done' : '');
      text.textContent = item.text;
      text.addEventListener('click', () => { toggleTodo(idx); });

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.addEventListener('click', () => { deleteTodo(idx); });

      row.appendChild(check);
      row.appendChild(text);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  function addTodo() {
    const input = document.getElementById('addInput');
    const text = input.value.trim();
    if (!text || !activeKey) return;
    if (!todos[activeKey]) todos[activeKey] = [];
    todos[activeKey].push({ text, done: false });
    save();
    input.value = '';
    renderList();
    renderCalendar();
    input.focus();
  }

  function toggleTodo(idx) {
    todos[activeKey][idx].done = !todos[activeKey][idx].done;
    save();
    renderList();
    renderCalendar();
  }

  function deleteTodo(idx) {
    todos[activeKey].splice(idx, 1);
    if (todos[activeKey].length === 0) delete todos[activeKey];
    save();
    renderList();
    renderCalendar();
  }

  document.getElementById('addBtn').addEventListener('click', addTodo);
  document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
