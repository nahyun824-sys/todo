<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Calendar</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--primary:#667eea;--red:#f56565;--green:#68d391;--gray:#f0f2f5;--nav:64px;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray);min-height:100vh;}

    /* ── Login ── */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-card{background:#fff;border-radius:24px;padding:48px 40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1);width:360px;}
    .login-icon{font-size:48px;margin-bottom:16px;}
    .login-title{font-size:24px;font-weight:700;color:#1a1a2e;margin-bottom:8px;}
    .login-desc{font-size:14px;color:#aaa;margin-bottom:32px;line-height:1.6;}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:1.5px solid #e2e5ea;border-radius:12px;font-size:15px;font-weight:600;color:#333;cursor:pointer;transition:background .15s;}
    .google-btn:hover{background:#f8f9fa;}
    .google-btn:disabled{opacity:.4;cursor:default;}
    .google-logo{width:20px;height:20px;}
    .setup-notice{margin-top:20px;padding:16px;background:#fff8e1;border-radius:12px;font-size:13px;color:#856404;text-align:left;line-height:1.7;}

    /* ── App ── */
    #appScreen{display:none;padding-bottom:var(--nav);}
    .viewing-banner{display:none;background:var(--primary);color:#fff;padding:10px 20px;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;}
    .viewing-banner.on{display:flex;}
    .back-btn{background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;}
    .app-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0;}
    .cal-title{font-size:20px;font-weight:700;color:#1a1a2e;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .nav-group{display:flex;gap:6px;}
    .nav-btn{background:#fff;border:none;border-radius:10px;width:34px;height:34px;font-size:17px;cursor:pointer;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:background .15s;}
    .nav-btn:hover{background:#e2e5ea;}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
    .user-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .signout-btn{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:5px 10px;font-size:12px;color:#888;cursor:pointer;}

    /* ── Views ── */
    .view{display:none;padding:16px 20px;}
    .view.active{display:block;}

    /* ── Bottom Nav ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:#fff;border-top:1px solid #f0f2f5;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.06);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;color:#bbb;transition:color .15s;}
    .nav-item .ni{font-size:21px;}
    .nav-item.active{color:var(--primary);}

    /* ── Calendar ── */
    .calendar-wrap{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.07);overflow:hidden;}
    .weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #f0f2f5;}
    .weekdays span{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:10px 0;}
    .weekdays span:first-child{color:var(--red);}
    .weekdays span:last-child{color:var(--primary);}
    /* 셀 고정 높이 — 내용이 넘쳐도 칸 크기 불변 */
    .days-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:130px;border-left:1px solid #f0f2f5;}
    .day-cell{border-right:1px solid #f0f2f5;border-bottom:1px solid #f0f2f5;padding:5px 6px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:2px;height:130px;overflow:hidden;}
    .day-cell:hover:not(.empty){background:#fafbff;}
    .day-cell.empty{cursor:default;background:#fafafa;}
    .day-cell.selected{background:#f5f3ff;}
    .day-top{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .day-num{font-size:12px;font-weight:600;color:#444;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;}
    .day-cell.sunday .day-num{color:var(--red);}
    .day-cell.saturday .day-num{color:var(--primary);}
    .day-cell.today .day-num{background:var(--primary);color:#fff!important;}
    .day-cell.selected:not(.today) .day-num{background:#667eea22;color:var(--primary);}

    /* 셀 내부 아이템 — 모두 ellipsis */
    .cell-kws{display:flex;flex-wrap:nowrap;gap:2px;overflow:hidden;flex-shrink:0;}
    .cell-kw{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;flex-shrink:0;}
    .cell-events{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
    .cell-event{display:flex;align-items:center;gap:3px;font-size:10px;padding:2px 5px;border-radius:4px;background:#e8f4fd;color:#1a5276;overflow:hidden;flex-shrink:0;}
    .cell-event-time{font-weight:700;white-space:nowrap;flex-shrink:0;}
    .cell-event-title{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;}
    .cell-todos{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
    .cell-todo{display:flex;align-items:center;gap:3px;font-size:10px;padding:2px 4px;border-radius:4px;background:#f0f2f5;overflow:hidden;flex-shrink:0;}
    .cell-todo.done-item{background:#f0fff4;}
    .cell-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--red);}
    .cell-todo.done-item .cell-dot{background:var(--green);}
    .cell-todo-text{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#555;flex:1;}
    .cell-todo.done-item .cell-todo-text{text-decoration:line-through;color:#aaa;}
    .cell-more{font-size:9px;color:#aaa;padding:0 3px;flex-shrink:0;}

    /* ── Memos view ── */
    .memos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .memos-title{font-size:17px;font-weight:700;color:#1a1a2e;}
    .kw-manage-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
    .kw-filter-wrap{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
    .kw-filter-label{font-size:11px;color:#aaa;font-weight:600;margin-bottom:8px;}
    .kw-chips{display:flex;flex-wrap:wrap;gap:6px;}
    .kwchip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
    .kwchip.off{opacity:.35;}
    .kwchip-all{background:#f0f2f5;color:#555;}
    .memo-date-group{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s;}
    .memo-date-group:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
    .memo-group-date{font-size:11px;color:#aaa;margin-bottom:8px;font-weight:600;}
    .memo-group-item{padding:8px 0;border-bottom:1px solid #f0f2f5;}
    .memo-group-item:last-child{border-bottom:none;}
    .memo-group-kws{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
    .memo-group-text{font-size:13px;color:#333;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .no-memos{text-align:center;color:#ccc;font-size:14px;padding:40px 0;}

    /* ── Settings ── */
    .settings-section{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
    .sec-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:14px;}
    .share-link-box{background:#f5f3ff;border-radius:10px;padding:11px 13px;font-size:12px;color:var(--primary);word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
    .copy-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .su-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f2f5;}
    .su-item:last-child{border-bottom:none;}
    .su-av{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
    .su-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .su-info{flex:1;}
    .su-name{font-size:13px;font-weight:600;color:#333;}
    .su-email{font-size:11px;color:#aaa;}
    .remove-btn{background:none;border:1px solid #f0f2f5;border-radius:8px;padding:4px 9px;font-size:11px;color:#aaa;cursor:pointer;}
    .remove-btn:hover{border-color:var(--red);color:var(--red);}
    .view-cal-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
    .log-item{padding:8px 0;border-bottom:1px solid #f0f2f5;font-size:12px;}
    .log-item:last-child{border-bottom:none;}
    .log-who{color:#333;font-weight:600;}
    .log-when{color:#aaa;margin-top:2px;}
    .log-type-join{color:var(--primary);}
    .log-type-view{color:var(--green);}
    .empty-sec{text-align:center;color:#ccc;font-size:13px;padding:20px 0;}

    /* ── Modal ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:#fff;border-radius:20px;padding:22px;width:440px;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .18s ease;}
    @keyframes popIn{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
    .modal-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;flex-shrink:0;}
    .modal-date{font-size:12px;color:#aaa;margin-bottom:3px;}
    .modal-title{font-size:17px;font-weight:700;color:#1a1a2e;}
    .close-btn{background:#f0f2f5;border:none;border-radius:8px;width:28px;height:28px;font-size:15px;cursor:pointer;color:#888;flex-shrink:0;}
    .readonly-badge{background:#fff8e1;color:#856404;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;}
    .tabs{display:flex;gap:4px;margin-bottom:12px;background:#f0f2f5;padding:4px;border-radius:10px;flex-shrink:0;}
    .tab-btn{flex:1;padding:7px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all .15s;}
    .tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .tab-content{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
    .tab-content.active{display:flex;}

    /* Todo tab */
    .add-row{display:flex;gap:7px;margin-bottom:10px;flex-shrink:0;}
    .add-input{flex:1;border:1.5px solid #e2e5ea;border-radius:10px;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s;color:#333;}
    .add-input:focus{border-color:var(--primary);}
    .add-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:19px;cursor:pointer;}
    .todo-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
    .todo-item{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#fafafa;border-radius:10px;user-select:none;}
    .todo-item:hover{background:#f0f2f5;}
    .todo-check{width:18px;height:18px;border-radius:50%;border:2px solid #ddd;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .todo-check.checked{background:var(--green);border-color:var(--green);}
    .todo-check.checked::after{content:'✓';color:#fff;font-size:10px;font-weight:700;}
    .todo-text{flex:1;font-size:13px;color:#333;word-break:break-all;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .todo-text.done{text-decoration:line-through;color:#aaa;}
    /* 인라인 편집 input */
    .todo-edit-input{flex:1;border:none;border-bottom:1.5px solid var(--primary);background:transparent;font-size:13px;color:#333;outline:none;padding:1px 0;}
    .del-btn{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;padding:1px 3px;border-radius:5px;flex-shrink:0;}
    .del-btn:hover{color:var(--red);}
    .edit-hint{font-size:10px;color:#ccc;text-align:center;padding:4px 0;flex-shrink:0;}
    /* 드래그 핸들 */
    .drag-handle{color:#d0d5dd;font-size:15px;cursor:grab;flex-shrink:0;padding:0 3px;user-select:none;touch-action:none;line-height:1;}
    .drag-handle:hover{color:#9ca3af;}
    .drag-item.is-dragging{opacity:.35;}
    .drag-placeholder{border-radius:10px;background:#eef2ff;border:2px dashed #818cf8;flex-shrink:0;}
    .empty-msg{text-align:center;color:#ccc;font-size:13px;padding:20px 0;}

    /* Events tab */
    .event-add-row{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
    .time-input{border:1.5px solid #e2e5ea;border-radius:10px;padding:9px 10px;font-size:13px;outline:none;width:95px;color:#333;transition:border-color .15s;}
    .time-input:focus{border-color:var(--primary);}
    .event-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
    .event-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#fafafa;border-radius:10px;}
    .event-row:hover{background:#f0f2f5;}
    .event-time-badge{font-size:11px;font-weight:700;color:#1a5276;background:#e8f4fd;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
    .event-time-badge.no-time{background:#f0f2f5;color:#aaa;}
    .event-title{flex:1;font-size:13px;color:#333;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .event-edit-input{flex:1;border:none;border-bottom:1.5px solid var(--primary);background:transparent;font-size:13px;color:#333;outline:none;padding:1px 0;}

    /* Memo tab — multiple memos */
    .memo-add-btn{display:flex;align-items:center;gap:6px;background:#f5f3ff;color:var(--primary);border:1.5px dashed #c4b5fd;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center;margin-bottom:10px;flex-shrink:0;}
    .memo-add-btn:hover{background:#ede9fe;}
    .memo-entries{display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
    .memo-entry{background:#fafafa;border-radius:12px;padding:12px;border:1.5px solid #f0f2f5;}
    .memo-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .memo-entry-kws{display:flex;flex-wrap:wrap;gap:5px;align-items:center;flex:1;}
    .mkwchip{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
    .mkwchip.sel{border-color:currentColor;}
    .memo-entry-del{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;flex-shrink:0;}
    .memo-entry-del:hover{color:var(--red);}
    .memo-textarea{width:100%;border:none;background:transparent;font-size:13px;color:#333;line-height:1.7;resize:none;outline:none;font-family:inherit;min-height:80px;}
    .memo-entry-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:6px;gap:8px;}
    .memo-save-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer;}
    .memo-saved-txt{font-size:11px;color:var(--green);display:none;}

    /* ── Keyword Manager Modal ── */
    .kw-modal{background:#fff;border-radius:20px;padding:22px;width:340px;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .18s ease;}
    .kw-list{display:flex;flex-direction:column;gap:7px;overflow-y:auto;margin-bottom:12px;flex:1;}
    .kw-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;background:#fafafa;}
    .kw-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .kw-label{flex:1;font-size:13px;color:#333;font-weight:600;}
    .kw-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;}
    .kw-del:hover{color:var(--red);}
    .kw-add-row{display:flex;gap:6px;}
    .kw-add-input{flex:1;border:1.5px solid #e2e5ea;border-radius:9px;padding:8px 11px;font-size:13px;outline:none;transition:border-color .15s;}
    .kw-add-input:focus{border-color:var(--primary);}
    .color-pick{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
    .cpick{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s;}
    .cpick.sel{border-color:#333;transform:scale(1.2);}
    .kw-add-btn{background:var(--primary);color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:13px;cursor:pointer;}
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <div class="login-title">Todo Calendar</div>
    <div class="login-desc">어디서든 같은 데이터를<br>확인할 수 있어요</div>
    <button class="google-btn" id="googleLoginBtn">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 로그인
    </button>
    <div id="setupNotice" class="setup-notice" style="display:none">⚠️ Firebase 설정이 필요합니다.</div>
  </div>
</div>

<!-- App -->
<div id="appScreen">
  <div class="viewing-banner" id="viewingBanner">
    <span id="viewingLabel"></span>
    <button class="back-btn" id="backToMineBtn">내 달력으로</button>
  </div>
  <div class="app-header">
    <div class="cal-title" id="calTitle"></div>
    <div class="header-right">
      <div class="nav-group" id="calNav">
        <button class="nav-btn" id="prevBtn">‹</button>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>
      <div class="user-avatar" id="userAvatar"></div>
      <button class="signout-btn" id="signOutBtn">로그아웃</button>
    </div>
  </div>

  <div id="viewCalendar" class="view active">
    <div class="calendar-wrap">
      <div class="weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span>
        <span>목</span><span>금</span><span>토</span>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>
  </div>

  <div id="viewMemos" class="view">
    <div class="memos-header">
      <div class="memos-title">메모 목록</div>
      <button class="kw-manage-btn" id="kwManageBtn">키워드 관리</button>
    </div>
    <div class="kw-filter-wrap">

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDUEaTTcv6pwxnKxc4PMYrv2RbOuSy02bw",
    authDomain: "nahyoni-todo.firebaseapp.com",
    projectId: "nahyoni-todo",
    storageBucket: "nahyoni-todo.firebasestorage.app",
    messagingSenderId: "1095838509318",
    appId: "1:1095838509318:web:f807ed15083a6c72d01687"
  };

  const KW_COLORS = [
    {bg:'#fce8e6',text:'#c0392b'},{bg:'#fef3cd',text:'#856404'},
    {bg:'#d1f2eb',text:'#1e8449'},{bg:'#d6eaf8',text:'#1a5276'},
    {bg:'#e8daef',text:'#76448a'},{bg:'#fdebd0',text:'#935116'},
    {bg:'#d5f5e3',text:'#196f3d'},{bg:'#eaecee',text:'#566573'},
  ];

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── State ──
  let me = null;
  let viewingUid = null, viewingName = '';
  let calTodos  = {};  // { dateKey: [{text,done}] }
  let calEvents = {};  // { dateKey: [{id,time,title}] }
  let calMemos  = {};  // { dateKey: [{id,text,kwIds}] }
  let calKeywords = [];
  let sharedWith = [], accessLogs = [], sharedCalendars = [];
  let activeKey = null;
  let currentView = 'viewCalendar';
  let kwFilterActive = null;
  let pickColorIdx = 0;
  let longPressTimer = null;
  let viewYear, viewMonth;
  const today = new Date();
  viewYear = today.getFullYear(); viewMonth = today.getMonth();
  let unsubs = [];

  function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function calUid(){ return viewingUid || me.uid; }
  function isReadOnly(){ return viewingUid !== null; }
  function uid(){ return me.uid; }
  function fmtTime(ts){
    if(!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function newId(){ return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  // ── Auth ──
  auth.onAuthStateChanged(async user => {
    me = user;
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      const av = document.getElementById('userAvatar');
      if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}"/>`;
      else av.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
      await db.collection('users').doc(uid()).set(
        { email:user.email, name:user.displayName||user.email, photo:user.photoURL||'' },
        { merge:true }
      );
      const params = new URLSearchParams(location.search);
      const joinUid = params.get('join'), viewUid = params.get('view');
      if (joinUid && joinUid !== uid()) {
        await handleJoin(joinUid);
        history.replaceState({}, '', location.pathname);
      } else if (viewUid && viewUid !== uid()) {
        await startViewingCalendar(viewUid);
      }
      startListeners();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      stopListeners();
    }
  });

  document.getElementById('googleLoginBtn').addEventListener('click', () =>
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert('로그인 실패: ' + e.message))
  );
  document.getElementById('signOutBtn').addEventListener('click', () => auth.signOut());

  // ── Sharing ──
  async function handleJoin(ownerUid) {
    const od = await db.collection('users').doc(ownerUid).get();
    const oData = od.data() || {};
    const oName = oData.name || oData.email || '알 수 없음';
    await db.collection('users').doc(ownerUid).collection('sharedWith').doc(uid()).set(
      { email:me.email, name:me.displayName||me.email, photo:me.photoURL||'', joinedAt:firebase.firestore.FieldValue.serverTimestamp() },
      { merge:true }
    );
    await db.collection('users').doc(ownerUid).collection('accessLogs').add(
      { viewerUid:uid(), email:me.email, name:me.displayName||me.email, photo:me.photoURL||'',
        timestamp:firebase.firestore.FieldValue.serverTimestamp(), type:'join' }
    );
    await db.collection('users').doc(uid()).collection('sharedCalendars').doc(ownerUid).set(
      { ownerUid, ownerEmail:oData.email||'', ownerName:oName, ownerPhoto:oData.photo||'',
        joinedAt:firebase.firestore.FieldValue.serverTimestamp() },
      { merge:true }
    );
    alert(`${oName}님의 달력에 참여했어요!`);
  }

  async function startViewingCalendar(ownerUid) {
    const od = await db.collection('users').doc(ownerUid).get();
    const oData = od.data() || {};
    viewingUid = ownerUid;
    viewingName = oData.name || oData.email || '알 수 없음';
    document.getElementById('viewingLabel').textContent = `${viewingName}님의 달력을 보는 중`;
    document.getElementById('viewingBanner').classList.add('on');
    await db.collection('users').doc(ownerUid).collection('accessLogs').add(
      { viewerUid:uid(), email:me.email, name:me.displayName||me.email, photo:me.photoURL||'',
        timestamp:firebase.firestore.FieldValue.serverTimestamp(), type:'view' }
    );
    startListeners();
  }

  document.getElementById('backToMineBtn').addEventListener('click', () => {
    viewingUid = null; viewingName = '';
    document.getElementById('viewingBanner').classList.remove('on');
    history.replaceState({}, '', location.pathname);
    stopListeners(); startListeners();
  });

  // ── Firestore ──
  function parseSnap(snap) {
    calTodos = {}; calEvents = {}; calMemos = {};
    snap.forEach(doc => {
      const d = doc.data();
      if (d.todos && d.todos.length)  calTodos[doc.id]  = d.todos;
      if (d.events && d.events.length) calEvents[doc.id] = d.events;
      if (d.memos && d.memos.length) {
        calMemos[doc.id] = d.memos;
      } else if (d.memo) {
        // 이전 단일 메모 형식 자동 마이그레이션
        calMemos[doc.id] = [{ id: 'legacy', text: d.memo, kwIds: d.memoKws || [] }];
      }
    });
  }

  function startListeners() {
    stopListeners();
    const watchUid = calUid();
    unsubs.push(
      db.collection('users').doc(watchUid).collection('dates').onSnapshot(snap => {
        parseSnap(snap);
        renderCalendar();
        if (activeKey) { renderTodoList(); renderEventList(); renderMemoEntries(); }
        if (currentView === 'viewMemos') renderMemos();
      })
    );
    unsubs.push(
      db.collection('users').doc(watchUid).onSnapshot(doc => {
        calKeywords = (doc.data() || {}).keywords || [];
        renderCalendar();
        if (activeKey) renderMemoEntries();
        if (currentView === 'viewMemos') renderMemos();
      })
    );
    unsubs.push(
      db.collection('users').doc(uid()).collection('sharedWith').onSnapshot(snap => {
        sharedWith = []; snap.forEach(doc => sharedWith.push({...doc.data(), docId:doc.id}));
        if (currentView === 'viewSettings') renderSettings();
      })
    );
    unsubs.push(
      db.collection('users').doc(uid()).collection('accessLogs')
        .orderBy('timestamp','desc').limit(30).onSnapshot(snap => {
          accessLogs = []; snap.forEach(doc => accessLogs.push(doc.data()));
          if (currentView === 'viewSettings') renderSettings();
        })
    );
    unsubs.push(
      db.collection('users').doc(uid()).collection('sharedCalendars').onSnapshot(snap => {
        sharedCalendars = []; snap.forEach(doc => sharedCalendars.push(doc.data()));
        if (currentView === 'viewSettings') renderSettings();
      })
    );
  }
  function stopListeners(){ unsubs.forEach(u => u()); unsubs = []; }

  // ── Drag-to-reorder ──
  function setupDragSort(listEl, getArr, onDrop) {
    let dragEl = null, placeholder = null, fromIdx = -1, capturedId = null;
    listEl.addEventListener('pointerdown', e => {
      if (!e.target.closest('[data-drag-handle]')) return;
      const row = e.target.closest('.drag-item');
      if (!row) return;
      e.preventDefault();
      listEl.setPointerCapture(e.pointerId);
      capturedId = e.pointerId;
      fromIdx = parseInt(row.dataset.idx);
      dragEl = row;
      dragEl.classList.add('is-dragging');
      placeholder = document.createElement('div');
      placeholder.className = 'drag-placeholder';
      placeholder.style.height = row.offsetHeight + 'px';
      row.after(placeholder);
    });
    listEl.addEventListener('pointermove', e => {
      if (!dragEl || e.pointerId !== capturedId) return;
      e.preventDefault();
      const peers = [...listEl.querySelectorAll('.drag-item:not(.is-dragging)')];
      let placed = false;
      for (const peer of peers) {
        const r = peer.getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) {
          listEl.insertBefore(placeholder, peer);
          placed = true; break;
        }
      }
      if (!placed) listEl.appendChild(placeholder);
    });
    function endDrag(e) {
      if (!dragEl || (e && e.pointerId !== capturedId)) return;
      dragEl.classList.remove('is-dragging');
      let toIdx = 0;
      for (const child of listEl.children) {
        if (child === placeholder) break;
        if (child.classList.contains('drag-item')) toIdx++;
      }
      placeholder.remove(); placeholder = null;
      if (fromIdx !== toIdx) {
        const arr = getArr();
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        onDrop();
      }
      dragEl = null; fromIdx = -1; capturedId = null;
    }
    listEl.addEventListener('pointerup', endDrag);
    listEl.addEventListener('pointercancel', () => {
      if (!dragEl) return;
      dragEl.classList.remove('is-dragging');
      if (placeholder) { placeholder.remove(); placeholder = null; }
      dragEl = null; fromIdx = -1; capturedId = null;
    });
  }

  function saveDate(key) {
    if (isReadOnly()) return;
    return db.collection('users').doc(uid()).collection('dates').doc(key).set({
      todos:  calTodos[key]  || [],
      events: calEvents[key] || [],
      memos:  calMemos[key]  || []
    });
  }
  function saveKeywords(){
    if (isReadOnly()) return;
    return db.collection('users').doc(uid()).set({ keywords: calKeywords }, { merge:true });
  }

  // ── View switching ──
  function switchView(viewId) {
    currentView = viewId;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === viewId));
    const showCalNav = viewId === 'viewCalendar';
    document.getElementById('calNav').style.display = showCalNav ? '' : 'none';
    document.getElementById('calTitle').style.display = showCalNav ? '' : 'none';
    if (viewId === 'viewCalendar') renderCalendar();
    if (viewId === 'viewMemos') renderMemos();
    if (viewId === 'viewSettings') renderSettings();
  }
  document.querySelectorAll('.nav-item').forEach(b =>
    b.addEventListener('click', () => switchView(b.dataset.view))
  );

  // ── Calendar ──
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const WD = ['일','월','화','수','목','금','토'];

  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${viewYear}년 ${MONTHS[viewMonth]}`;
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div'); e.className = 'day-cell empty'; grid.appendChild(e);
    }
    for (let d = 1; d <= lastDate; d++) {
      const key = dateKey(viewYear, viewMonth, d);
      const dow  = (firstDay + d - 1) % 7;
      const isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();

      let cls = 'day-cell';
      if (dow === 0) cls += ' sunday';
      if (dow === 6) cls += ' saturday';
      if (isToday)   cls += ' today';
      if (key === activeKey) cls += ' selected';

      const cell = document.createElement('div'); cell.className = cls;

      // 날짜 숫자
      const top = document.createElement('div'); top.className = 'day-top';
      const num = document.createElement('div'); num.className = 'day-num'; num.textContent = d;
      top.appendChild(num);
      cell.appendChild(top);

      // 메모 키워드 칩 (모든 메모에서 수집, 최대 3개)
      const allMemos = calMemos[key] || [];
      const kwIdSet = new Set();
      allMemos.forEach(m => (m.kwIds || []).forEach(id => kwIdSet.add(id)));
      const kwIds = [...kwIdSet];
      if (kwIds.length > 0) {
        const kwRow = document.createElement('div'); kwRow.className = 'cell-kws';
        kwIds.slice(0, 3).forEach(kwId => {
          const kw = calKeywords.find(k => k.id === kwId);
          if (!kw) return;
          const c = KW_COLORS[kw.colorIdx] || KW_COLORS[0];
          const chip = document.createElement('span'); chip.className = 'cell-kw';
          chip.style.cssText = `background:${c.bg};color:${c.text}`;
          chip.textContent = kw.label;
          kwRow.appendChild(chip);
        });
        cell.appendChild(kwRow);
      } else if (allMemos.length > 0) {
        // 키워드 없는 메모는 📝 표시
        const ic = document.createElement('span'); ic.style.cssText = 'font-size:10px;padding:1px 0';
        ic.textContent = allMemos.length > 1 ? `📝 ${allMemos.length}` : '📝';
        cell.appendChild(ic);
      }

      // 일정 (최대 2개)
      const events = calEvents[key] || [];
      if (events.length > 0) {
        const evEl = document.createElement('div'); evEl.className = 'cell-events';
        events.slice(0, 2).forEach(ev => {
          const row = document.createElement('div'); row.className = 'cell-event';
          if (ev.time) {
            const t = document.createElement('span'); t.className = 'cell-event-time'; t.textContent = ev.time;
            row.appendChild(t);
          }
          const ti = document.createElement('span'); ti.className = 'cell-event-title'; ti.textContent = ev.title;
          row.appendChild(ti);
          evEl.appendChild(row);
        });
        cell.appendChild(evEl);
      }

      // 할 일 (남은 공간에)
      const todos = calTodos[key] || [];
      if (todos.length > 0) {
        const tdEl = document.createElement('div'); tdEl.className = 'cell-todos';
        const maxShow = events.length > 0 ? 2 : 3;
        todos.slice(0, maxShow).forEach(item => {
          const row = document.createElement('div');
          row.className = 'cell-todo' + (item.done ? ' done-item' : '');
          const dot = document.createElement('div'); dot.className = 'cell-dot';
          const txt = document.createElement('div'); txt.className = 'cell-todo-text'; txt.textContent = item.text;
          row.appendChild(dot); row.appendChild(txt);
          tdEl.appendChild(row);
        });
        const totalExtra = todos.length + events.length - maxShow - Math.min(events.length, 2);
        if (totalExtra > 0) {
          const more = document.createElement('div'); more.className = 'cell-more';
          more.textContent = `+${totalExtra}개 더`;
          tdEl.appendChild(more);
        }
        cell.appendChild(tdEl);
      }

      cell.addEventListener('click', () => openModal(viewYear, viewMonth, d));
      grid.appendChild(cell);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar();
  });

  // ── Modal open/close ──
  function openModal(y, m, d) {
    activeKey = dateKey(y, m, d);
    document.getElementById('modalDate').textContent = `${y}년 ${m+1}월 ${d}일 (${WD[new Date(y,m,d).getDay()]})`;
    document.getElementById('readonlyBadge').style.display = isReadOnly() ? '' : 'none';
    document.getElementById('todoAddRow').style.display  = isReadOnly() ? 'none' : '';
    document.getElementById('eventAddRow').style.display = isReadOnly() ? 'none' : '';
    document.getElementById('memoAddBtn').style.display  = isReadOnly() ? 'none' : '';
    document.getElementById('editHint').style.display    = isReadOnly() ? 'none' : '';
    switchTab('todo');
    document.getElementById('addInput').value = '';
    renderTodoList(); renderEventList(); renderMemoEntries();
    document.getElementById('overlay').classList.add('open');
    if (!isReadOnly()) document.getElementById('addInput').focus();
    renderCalendar();
  }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    activeKey = null; renderCalendar();
  }
  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    ['todo','event','memo'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))
        .classList.toggle('active', t === tab);
    });
    if (tab === 'todo' && !isReadOnly()) setTimeout(() => document.getElementById('addInput').focus(), 50);
    if (tab === 'event' && !isReadOnly()) setTimeout(() => document.getElementById('eventTitleInput').focus(), 50);
  }
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  // 드래그 정렬 초기화
  setupDragSort(
    document.getElementById('todoList'),
    () => calTodos[activeKey] || [],
    () => { saveDate(activeKey); renderTodoList(); }
  );
  setupDragSort(
    document.getElementById('eventList'),
    () => calEvents[activeKey] || [],
    () => { saveDate(activeKey); renderEventList(); renderCalendar(); }
  );

  // ── Todos ──
  function renderTodoList() {
    const list  = document.getElementById('todoList');
    const items = calTodos[activeKey] || [];
    if (items.length === 0) { list.innerHTML = '<div class="empty-msg">아직 할일이 없어요</div>'; return; }
    list.innerHTML = '';
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'todo-item drag-item';
      row.dataset.idx = idx;

      if (!isReadOnly()) {
        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.setAttribute('data-drag-handle', '');
        row.appendChild(handle);
      }

      const check = document.createElement('div');
      check.className = 'todo-check' + (item.done ? ' checked' : '');
      if (!isReadOnly()) check.addEventListener('click', () => toggleTodo(idx));

      const text = document.createElement('div');
      text.className = 'todo-text' + (item.done ? ' done' : '');
      text.textContent = item.text;
      if (!isReadOnly()) text.addEventListener('click', e => { if (!e._fromLongPress) toggleTodo(idx); });

      row.appendChild(check); row.appendChild(text);

      if (!isReadOnly()) {
        const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×';
        del.addEventListener('click', () => deleteTodo(idx));
        row.appendChild(del);

        // 더블클릭으로 인라인 편집
        text.addEventListener('dblclick', e => { e.preventDefault(); editTodoInline(idx, row); });
      }
      list.appendChild(row);
    });
  }

  function editTodoInline(idx, rowEl) {
    const item = (calTodos[activeKey] || [])[idx];
    if (!item) return;
    const textEl = rowEl.querySelector('.todo-text');
    const delEl  = rowEl.querySelector('.del-btn');
    const input  = document.createElement('input');
    input.className = 'todo-edit-input';
    input.value = item.text;
    textEl.style.display = 'none';
    if (delEl) delEl.style.display = 'none';
    rowEl.insertBefore(input, textEl);
    input.focus(); input.select();
    let done = false;
    function commit() {
      if (done) return; done = true;
      const v = input.value.trim();
      if (v) item.text = v;
      saveDate(activeKey);
      renderTodoList(); renderCalendar();
    }
    function cancel() {
      if (done) return; done = true;
      renderTodoList();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', commit); cancel(); }
    });
  }

  function addTodo() {
    if (isReadOnly()) return;
    const input = document.getElementById('addInput');
    const text  = input.value.trim();
    if (!text || !activeKey) return;
    if (!calTodos[activeKey]) calTodos[activeKey] = [];
    calTodos[activeKey].push({ text, done: false });
    saveDate(activeKey); input.value = ''; input.focus();
  }
  function toggleTodo(idx) { calTodos[activeKey][idx].done = !calTodos[activeKey][idx].done; saveDate(activeKey); }
  function deleteTodo(idx) {
    calTodos[activeKey].splice(idx, 1);
    if (!calTodos[activeKey].length) delete calTodos[activeKey];
    saveDate(activeKey);
  }
  document.getElementById('addBtn').addEventListener('click', addTodo);
  document.getElementById('addInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  // ── Events (일정) ──
  function renderEventList() {
    const list   = document.getElementById('eventList');
    const events = calEvents[activeKey] || [];
    if (events.length === 0) { list.innerHTML = '<div class="empty-msg">등록된 일정이 없어요</div>'; return; }
    list.innerHTML = '';
    events.forEach((ev, idx) => {
      const row = document.createElement('div');
      row.className = 'event-row drag-item';
      row.dataset.idx = idx;

      if (!isReadOnly()) {
        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.setAttribute('data-drag-handle', '');
        row.appendChild(handle);
      }

      const timeBadge = document.createElement('span');
      timeBadge.className = 'event-time-badge' + (ev.time ? '' : ' no-time');
      timeBadge.textContent = ev.time || '시간 없음';
      row.appendChild(timeBadge);

      const titleEl = document.createElement('div'); titleEl.className = 'event-title'; titleEl.textContent = ev.title;
      row.appendChild(titleEl);

      if (!isReadOnly()) {
        titleEl.addEventListener('dblclick', e => { e.preventDefault(); editEventInline(ev, row, timeBadge, titleEl); });

        const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×';
        del.addEventListener('click', () => {
          calEvents[activeKey] = (calEvents[activeKey] || []).filter(e => e.id !== ev.id);
          if (!calEvents[activeKey].length) delete calEvents[activeKey];
          saveDate(activeKey); renderEventList(); renderCalendar();
        });
        row.appendChild(del);
      }
      list.appendChild(row);
    });
  }

  function editEventInline(ev, rowEl, timeBadge, titleEl) {
    const timeInput = document.createElement('input');
    timeInput.type = 'time'; timeInput.value = ev.time || '';
    timeInput.className = 'time-input'; timeInput.style.width = '90px';
    const titleInput = document.createElement('input');
    titleInput.className = 'event-edit-input'; titleInput.value = ev.title;
    timeBadge.style.display = 'none'; titleEl.style.display = 'none';
    rowEl.insertBefore(timeInput, timeBadge); rowEl.insertBefore(titleInput, titleEl);
    titleInput.focus(); titleInput.select();
    let done = false;
    function commit() {
      if (done) return; done = true;
      const t = titleInput.value.trim();
      if (t) { ev.title = t; ev.time = timeInput.value; }
      saveDate(activeKey); renderEventList(); renderCalendar();
    }
    titleInput.addEventListener('blur', () => setTimeout(commit, 150));
    titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } });
  }

  function addEvent() {
    if (isReadOnly()) return;
    const titleInput = document.getElementById('eventTitleInput');
    const timeInput  = document.getElementById('eventTimeInput');
    const title = titleInput.value.trim();
    if (!title || !activeKey) return;
    if (!calEvents[activeKey]) calEvents[activeKey] = [];
    calEvents[activeKey].push({ id: newId(), time: timeInput.value, title });
    saveDate(activeKey); titleInput.value = ''; timeInput.value = ''; titleInput.focus();
    renderEventList(); renderCalendar();
  }
  document.getElementById('eventAddBtn').addEventListener('click', addEvent);
  document.getElementById('eventTitleInput').addEventListener('keydown', e => { if (e.key === 'Enter') addEvent(); });

  // ── Memos (여러 개) ──
  function renderMemoEntries() {
    const container = document.getElementById('memoEntries');
    const entries   = calMemos[activeKey] || [];
    container.innerHTML = '';
    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-msg">메모가 없어요</div>';
      return;
    }
    entries.forEach((memo, idx) => {
      const card = document.createElement('div'); card.className = 'memo-entry';

      // 상단: 키워드 + 삭제
      const top = document.createElement('div'); top.className = 'memo-entry-top';
      const kwArea = document.createElement('div'); kwArea.className = 'memo-entry-kws';

      calKeywords.forEach(kw => {
        const c = KW_COLORS[kw.colorIdx] || KW_COLORS[0];
        const isSel = (memo.kwIds || []).includes(kw.id);
        const chip = document.createElement('span');
        chip.className = 'mkwchip' + (isSel ? ' sel' : '');
        chip.style.cssText = `background:${c.bg};color:${c.text}`;
        chip.textContent = kw.label;
        if (!isReadOnly()) {
          chip.addEventListener('click', () => {
            if (!memo.kwIds) memo.kwIds = [];
            const i = memo.kwIds.indexOf(kw.id);
            if (i >= 0) memo.kwIds.splice(i, 1); else memo.kwIds.push(kw.id);
            saveDate(activeKey); renderMemoEntries(); renderCalendar();
          });
        }
        kwArea.appendChild(chip);
      });
      if (calKeywords.length === 0) {
        kwArea.innerHTML = '<span style="font-size:11px;color:#ccc;">키워드 없음 (메모 화면에서 추가)</span>';
      }
      top.appendChild(kwArea);

      if (!isReadOnly()) {
        const delBtn = document.createElement('button'); delBtn.className = 'memo-entry-del'; delBtn.textContent = '🗑';
        delBtn.addEventListener('click', () => {
          calMemos[activeKey].splice(idx, 1);
          if (!calMemos[activeKey].length) delete calMemos[activeKey];
          saveDate(activeKey); renderMemoEntries(); renderCalendar();
        });
        top.appendChild(delBtn);
      }
      card.appendChild(top);

      // 텍스트 영역
      const ta = document.createElement('textarea'); ta.className = 'memo-textarea';
      ta.value = memo.text || '';
      ta.readOnly = isReadOnly();
      ta.placeholder = '메모를 입력하세요...';
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
      card.appendChild(ta);

      if (!isReadOnly()) {
        const footer = document.createElement('div'); footer.className = 'memo-entry-footer';
        const savedTxt = document.createElement('span'); savedTxt.className = 'memo-saved-txt'; savedTxt.textContent = '저장됐어요 ✓';
        const saveBtn = document.createElement('button'); saveBtn.className = 'memo-save-btn'; saveBtn.textContent = '저장';
        function doSave() {
          memo.text = ta.value;
          saveDate(activeKey); renderCalendar();
          savedTxt.style.display = 'inline';
          setTimeout(() => { savedTxt.style.display = 'none'; }, 2000);
        }
        saveBtn.addEventListener('click', doSave);
        ta.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); doSave(); } });
        footer.appendChild(savedTxt); footer.appendChild(saveBtn);
        card.appendChild(footer);
      }
      container.appendChild(card);
    });
  }

  document.getElementById('memoAddBtn').addEventListener('click', () => {
    if (!activeKey || isReadOnly()) return;
    if (!calMemos[activeKey]) calMemos[activeKey] = [];
    calMemos[activeKey].push({ id: newId(), text: '', kwIds: [] });
    renderMemoEntries();
    setTimeout(() => {
      const entries = document.getElementById('memoEntries');
      entries.scrollTop = entries.scrollHeight;
      const textareas = entries.querySelectorAll('.memo-textarea');
      if (textareas.length) textareas[textareas.length - 1].focus();
    }, 50);
  });

  // ── Memos view ──
  function renderMemos() {
    document.getElementById('calTitle').style.display = 'none';
    const filterEl = document.getElementById('kwFilterChips');
    filterEl.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'kwchip kwchip-all' + (kwFilterActive === null ? '' : ' off');
    allChip.textContent = '전체';
    allChip.addEventListener('click', () => { kwFilterActive = null; renderMemos(); });
    filterEl.appendChild(allChip);
    calKeywords.forEach(kw => {
      const c = KW_COLORS[kw.colorIdx] || KW_COLORS[0];
      const chip = document.createElement('button');
      chip.className = 'kwchip' + (kwFilterActive === kw.id ? '' : ' off');
      chip.style.cssText = `background:${c.bg};color:${c.text}`;
      chip.textContent = kw.label;
      chip.addEventListener('click', () => { kwFilterActive = kwFilterActive === kw.id ? null : kw.id; renderMemos(); });
      filterEl.appendChild(chip);
    });

    const container = document.getElementById('memoCards');
    container.innerHTML = '';

    let keys = Object.keys(calMemos);
    if (kwFilterActive) {
      keys = keys.filter(k => (calMemos[k] || []).some(m => (m.kwIds || []).includes(kwFilterActive)));
    }
    keys.sort((a, b) => b.localeCompare(a));

    if (keys.length === 0) { container.innerHTML = '<div class="no-memos">메모가 없어요</div>'; return; }

    keys.forEach(key => {
      const [y, m, d] = key.split('-').map(Number);
      const dow = new Date(y, m - 1, d).getDay();
      const memos = kwFilterActive
        ? (calMemos[key] || []).filter(m => (m.kwIds || []).includes(kwFilterActive))
        : (calMemos[key] || []);

      const group = document.createElement('div'); group.className = 'memo-date-group';
      const dateEl = document.createElement('div'); dateEl.className = 'memo-group-date';
      dateEl.textContent = `${y}년 ${m}월 ${d}일 (${WD[dow]}) · ${memos.length}개`;
      group.appendChild(dateEl);

      memos.forEach(memo => {
        const item = document.createElement('div'); item.className = 'memo-group-item';
        if (memo.kwIds && memo.kwIds.length > 0) {
          const kwRow = document.createElement('div'); kwRow.className = 'memo-group-kws';
          memo.kwIds.forEach(kwId => {
            const kw = calKeywords.find(k => k.id === kwId);
            if (!kw) return;
            const c = KW_COLORS[kw.colorIdx] || KW_COLORS[0];
            const chip = document.createElement('span'); chip.className = 'kwchip';
            chip.style.cssText = `background:${c.bg};color:${c.text}`; chip.textContent = kw.label;
            kwRow.appendChild(chip);
          });
          item.appendChild(kwRow);
        }
        const txt = document.createElement('div'); txt.className = 'memo-group-text';
        txt.textContent = memo.text || '(내용 없음)';
        item.appendChild(txt);
        group.appendChild(item);
      });

      group.addEventListener('click', () => {
        viewYear = y; viewMonth = m - 1;
        switchView('viewCalendar');
        setTimeout(() => openModal(y, m - 1, d), 80);
      });
      container.appendChild(group);
    });
  }

  // ── Keyword Manager ──
  document.getElementById('kwManageBtn').addEventListener('click', () => {
    renderKwManager(); document.getElementById('kwOverlay').classList.add('open');
  });
  document.getElementById('kwCloseBtn').addEventListener('click', () =>
    document.getElementById('kwOverlay').classList.remove('open')
  );
  document.getElementById('kwOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('kwOverlay'))
      document.getElementById('kwOverlay').classList.remove('open');
  });

  function renderKwManager() {
    const cp = document.getElementById('colorPick');
    cp.innerHTML = '';
    KW_COLORS.forEach((c, i) => {
      const dot = document.createElement('div');
      dot.className = 'cpick' + (i === pickColorIdx ? ' sel' : '');
      dot.style.background = c.bg; dot.style.borderColor = c.text;
      dot.addEventListener('click', () => { pickColorIdx = i; renderKwManager(); });
      cp.appendChild(dot);
    });
    const list = document.getElementById('kwList');
    list.innerHTML = '';
    if (calKeywords.length === 0) { list.innerHTML = '<div class="empty-msg">키워드가 없어요</div>'; return; }
    calKeywords.forEach((kw, idx) => {
      const c = KW_COLORS[kw.colorIdx] || KW_COLORS[0];
      const item = document.createElement('div'); item.className = 'kw-item';
      const dot = document.createElement('div'); dot.className = 'kw-color-dot'; dot.style.background = c.text;
      const label = document.createElement('div'); label.className = 'kw-label'; label.textContent = kw.label;
      const del = document.createElement('button'); del.className = 'kw-del'; del.textContent = '×';
      del.addEventListener('click', () => deleteKeyword(idx));
      item.appendChild(dot); item.appendChild(label); item.appendChild(del);
      list.appendChild(item);
    });
  }

  function addKeyword() {
    const input = document.getElementById('kwAddInput');
    const label = input.value.trim();
    if (!label) return;
    if (calKeywords.find(k => k.label === label)) { alert('이미 있는 키워드예요'); return; }
    calKeywords.push({ id: newId(), label, colorIdx: pickColorIdx });
    saveKeywords(); input.value = ''; renderKwManager(); renderMemos();
  }
  function deleteKeyword(idx) {
    const kwId = calKeywords[idx].id;
    calKeywords.splice(idx, 1);
    Object.keys(calMemos).forEach(key => {
      (calMemos[key] || []).forEach(m => {
        const i = (m.kwIds || []).indexOf(kwId);
        if (i >= 0) { m.kwIds.splice(i, 1); saveDate(key); }
      });
    });
    saveKeywords(); renderKwManager(); renderCalendar(); renderMemos();
  }
  document.getElementById('kwAddBtn').addEventListener('click', addKeyword);
  document.getElementById('kwAddInput').addEventListener('keydown', e => { if (e.key === 'Enter') addKeyword(); });

  // ── Settings ──
  function renderSettings() {
    document.getElementById('calTitle').style.display = 'none';
    document.getElementById('calNav').style.display = 'none';

    const baseUrl = location.origin + location.pathname;
    const shareLink = `${baseUrl}?join=${uid()}`;
    document.getElementById('shareLinkText').textContent = shareLink;
    document.getElementById('copyLinkBtn').onclick = () => {
      navigator.clipboard.writeText(shareLink).then(() => {
        document.getElementById('copyLinkBtn').textContent = '복사됨 ✓';
        setTimeout(() => { document.getElementById('copyLinkBtn').textContent = '복사'; }, 2000);
      });
    };

    const swEl = document.getElementById('sharedWithList');
    swEl.innerHTML = '';
    if (sharedWith.length === 0) { swEl.innerHTML = '<div class="empty-sec">아직 공유한 사람이 없어요</div>'; }
    else sharedWith.forEach(u => {
      const item = document.createElement('div'); item.className = 'su-item';
      const av = document.createElement('div'); av.className = 'su-av';
      if (u.photo) av.innerHTML = `<img src="${u.photo}"/>`; else av.textContent = (u.name||u.email||'?')[0].toUpperCase();
      const info = document.createElement('div'); info.className = 'su-info';
      info.innerHTML = `<div class="su-name">${u.name||''}</div><div class="su-email">${u.email||''}</div>`;
      const rm = document.createElement('button'); rm.className = 'remove-btn'; rm.textContent = '삭제';
      rm.addEventListener('click', async () => {
        if (!confirm(`${u.name||u.email}님의 접근을 삭제할까요?`)) return;
        await db.collection('users').doc(uid()).collection('sharedWith').doc(u.docId).delete();
      });
      item.appendChild(av); item.appendChild(info); item.appendChild(rm); swEl.appendChild(item);
    });

    const logEl = document.getElementById('accessLogList');
    logEl.innerHTML = '';
    if (accessLogs.length === 0) { logEl.innerHTML = '<div class="empty-sec">접근 기록이 없어요</div>'; }
    else accessLogs.forEach(log => {
      const item = document.createElement('div'); item.className = 'log-item';
      const typeLabel = log.type === 'join'
        ? '<span class="log-type-join">참여</span>'
        : '<span class="log-type-view">조회</span>';
      item.innerHTML = `<div class="log-who">${log.name||log.email} ${typeLabel}</div><div class="log-when">${fmtTime(log.timestamp)}</div>`;
      logEl.appendChild(item);
    });

    const scEl = document.getElementById('sharedCalList');
    scEl.innerHTML = '';
    if (sharedCalendars.length === 0) { scEl.innerHTML = '<div class="empty-sec">공유받은 달력이 없어요</div>'; }
    else sharedCalendars.forEach(cal => {
      const item = document.createElement('div'); item.className = 'su-item';
      const av = document.createElement('div'); av.className = 'su-av';
      if (cal.ownerPhoto) av.innerHTML = `<img src="${cal.ownerPhoto}"/>`; else av.textContent = (cal.ownerName||'?')[0].toUpperCase();
      const info = document.createElement('div'); info.className = 'su-info';
      info.innerHTML = `<div class="su-name">${cal.ownerName||''}</div><div class="su-email">${cal.ownerEmail||''}</div>`;
      const btn = document.createElement('button'); btn.className = 'view-cal-btn'; btn.textContent = '보기';
      btn.addEventListener('click', () => { location.href = location.origin + location.pathname + '?view=' + cal.ownerUid; });
      item.appendChild(av); item.appendChild(info); item.appendChild(btn); scEl.appendChild(item);
    });
  }

  renderCalendar();
</script>
</body>
</html>
